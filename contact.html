<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Potporli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'hsl(var(--primary))',
                        secondary: 'hsl(var(--secondary))',
                        accent: 'hsl(var(--accent))',
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-background text-foreground">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter gradient-text">POTPORLI</a>
            <div class="hidden md:flex items-center space-x-8 text-sm font-medium">
                <a href="index.html" class="hover:text-primary transition-colors">Home</a>
                <a href="index.html#services" class="hover:text-primary transition-colors">Services</a>
                <a href="about.html" class="hover:text-primary transition-colors">About</a>
                <a href="contact.html" class="text-primary">Contact</a>

                <!-- Theme Toggle Desktop -->
                <button
                    class="theme-toggle w-10 h-10 rounded-full glass border border-white/10 flex items-center justify-center hover:border-primary/50 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="sun-icon h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" class="moon-icon h-5 w-5 hidden" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>
            </div>
            <button id="mobile-menu-btn" class="md:hidden text-white/70 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Sidebar & Overlay -->
    <div id="overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[59]"></div>
    <aside id="sidebar"
        class="fixed top-0 left-0 h-full w-80 glass-dark z-[60] -translate-x-full transition-transform duration-300 p-8 flex flex-col">
        <div class="flex items-center justify-between mb-12">
            <span class="text-xl font-bold gradient-text">POTPORLI</span>
            <!-- Theme Toggle Mobile -->
            <button
                class="theme-toggle w-10 h-10 rounded-full glass border border-white/10 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="sun-icon h-5 w-5 text-white" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" class="moon-icon h-5 w-5 hidden" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
        </div>
        <div class="flex flex-col space-y-6 text-lg">
            <a href="index.html" class="hover:text-primary transition-colors">Home</a>
            <a href="index.html#services" class="hover:text-primary transition-colors">Services</a>
            <a href="about.html" class="hover:text-primary transition-colors">About</a>
            <a href="contact.html" class="text-primary">Contact</a>
        </div>
    </aside>

    <main class="pt-32 pb-20 px-6">
        <div class="max-w-7xl mx-auto reveal">
            <div class="flex flex-col md:flex-row gap-16">
                <!-- Info Section -->
                <div class="md:w-1/3">
                    <h1 class="text-5xl font-black tracking-tighter mb-8 leading-tight">
                        Let's <br><span class="gradient-text">Connect</span>
                    </h1>
                    <p class="text-white/50 mb-12 leading-relaxed">
                        Have a question or want to collaborate? We're here to help you build the future.
                    </p>

                    <div class="space-y-8">
                        <div>
                            <h4 class="text-sm font-bold uppercase tracking-widest text-primary mb-2">Email</h4>
                            <p class="text-xl font-medium">hello@potporli.io</p>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold uppercase tracking-widest text-secondary mb-2">Location</h4>
                            <p class="text-xl font-medium">Global / Remote</p>
                        </div>
                    </div>
                </div>

                <!-- Form Section -->
                <div class="md:w-2/3">
                    <div class="glass p-10 md:p-16 rounded-[3rem]">
                        <form class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-white/40 mb-2">Your Name</label>
                                    <input type="text"
                                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-primary outline-none transition-all"
                                        placeholder="John Doe">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-white/40 mb-2">Email Address</label>
                                    <input type="email"
                                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-primary outline-none transition-all"
                                        placeholder="john@example.com">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-white/40 mb-2">Subject</label>
                                <input type="text"
                                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-primary outline-none transition-all"
                                    placeholder="General Inquiry">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-white/40 mb-2">Message</label>
                                <textarea rows="6"
                                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-primary outline-none transition-all"
                                    placeholder="Tell us about your project..."></textarea>
                            </div>
                            <button type="button"
                                class="w-full py-5 rounded-2xl bg-gradient-to-r from-primary to-secondary font-black text-xl hover:opacity-90 active:scale-[0.98] transition-all shadow-xl shadow-primary/20">
                                Send Message
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="src/scripts/app.js"></script>
</body>

</html>
